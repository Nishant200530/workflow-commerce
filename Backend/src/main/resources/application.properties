# ================== SERVER ==================
server.port=${PORT:8080}

# ================== DATABASE CONFIG ==================

#  Works for BOTH:
# Local → MySQL
# Render → PostgreSQL (via ENV variables)

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/workflow_commerce?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:Nishant}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Nishu}

# ================== JPA ==================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ================== JWT ==================
workflow.app.jwtSecret=${JWT_SECRET:SecretKeyToGenJWTsForMoreSecurityInProductionEnvironmentExampleOnly}
workflow.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# ================== CORS ==================
workflow.app.allowedOrigins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ================== ACTUATOR ==================
management.endpoints.web.exposure.include=health,info,metrics,caches,env
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.info.env.enabled=true

# ================== APP INFO ==================
info.app.name=FlowForge
info.app.description=Enterprise Workflow Orchestration Engine
info.app.version=2.0.0
info.app.encoding=UTF-8
info.java.version=${java.version}

# ================== HIKARI ==================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ================== LOGGING ==================
logging.level.com.example.workflowcommerce=INFO
logging.level.org.springframework.cache=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n

# ================== SERVER COMPRESSION ==================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain