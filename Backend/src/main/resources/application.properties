server.port=${PORT:8080}

# ================== DATABASE CONFIG ==================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:workflow_commerce}?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:Nishant}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:Nishu}}

# ❌ REMOVE driver (auto detect works)
# spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update

# ================== YOUR EXISTING CONFIG ==================

workflow.app.jwtSecret=${JWT_SECRET:SecretKeyToGenJWTsForMoreSecurityInProductionEnvironmentExampleOnly}
workflow.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}
workflow.app.allowedOrigins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:50213,http://127.0.0.1:5173}

management.endpoints.web.exposure.include=health,info,metrics,caches,env
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true
management.info.env.enabled=true

info.app.name=FlowForge
info.app.description=Enterprise Workflow Orchestration Engine
info.app.version=2.0.0
info.app.encoding=UTF-8
info.java.version=${java.version}

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

logging.level.com.example.workflowcommerce=INFO
logging.level.org.springframework.cache=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain